services:
  mysql:
    image: mysql:8.0
    container_name: study-materials-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: StudyRoot2026!
      MYSQL_DATABASE: study_materials
      MYSQL_USER: study
      MYSQL_PASSWORD: StudyRoot2026!
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pStudyRoot2026!"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: .
    container_name: study-materials-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: study_materials
      DB_USER: study
      DB_PASSWORD: StudyRoot2026!
      JWT_SECRET: study-materials-secret-key-2026-min-32-bytes
      JWT_EXPIRATION_MINUTES: 120
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data: